<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 Days | 100 Projects - Tejesh Bhagat</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    header {
      padding: 3rem 1rem 1rem;
      text-align: center;
      background: rgba(0, 0, 0, 0.2);
    }
    header h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    header p {
      font-size: 1.1rem;
      color: #ddd;
    }

    .projects {
      max-width: 800px;
      margin: 2rem auto;
      padding: 1rem;
    }
    .project {
      background: rgba(255, 255, 255, 0.1);
      padding: 1rem;
      margin: 1rem 0;
      border-radius: 12px;
      transition: all 0.3s ease;
    }
    .project:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
    }
    .project a {
      color: #00d9ff;
      font-size: 1.1rem;
      font-weight: bold;
      text-decoration: none;
    }
    .project a:hover {
      text-decoration: underline;
    }
    .project-description {
      font-size: 0.95rem;
      color: #ccc;
      margin-top: 0.5rem;
    }

    /* Animated Bubbles */
    .bubbles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }
    .bubble {
      position: absolute;
      bottom: -100px;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      animation: rise 3s infinite ease-in;
    }
    @keyframes rise {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(0.5);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="bubbles">
    <!-- Random bubbles for animation -->
    <div class="bubble" style="left: 10%; width: 60px; height: 60px; animation-delay: 0s;"></div>
    <div class="bubble" style="left: 25%; animation-delay: 2s;"></div>
    <div class="bubble" style="left: 40%; width: 20px; height: 20px; animation-delay: 4s;"></div>
    <div class="bubble" style="left: 55%; width: 70px; height: 70px; animation-delay: 1s;"></div>
    <div class="bubble" style="left: 70%; animation-delay: 3s;"></div>
    <div class="bubble" style="left: 85%; width: 30px; height: 30px; animation-delay: 5s;"></div>
  </div>

  <header>
    <h1>💯 100 Days. 100 Projects.</h1>
    <p>Created by Tejesh Bhagat — Learn, Build, Repeat 🚀</p>
  </header>

  <section class="projects">
    <div class="project">
      <p>🧩 <strong>Day 1:</strong> <a href="Day01-HTML-Tags-Showcase/Index.html" target="_blank">HTML Tags Showcase</a></p>
      <p class="project-description">A beginner-friendly page displaying all major HTML tags with examples.</p>
    </div>
    <div class="project">
      <p>📩 <strong>Day 2:</strong> <a href="Day02-Tech-Newsletter/index.html" target="_blank">Tech Newsletter Page</a></p>
      <p class="project-description">A simple, clean newsletter subscription page designed with HTML & CSS.</p>
    </div>
    <!-- Add more projects daily like this -->
  </section>
</body>
</html>
